        strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>

}

/* ---------------------------------------------------------------
   window.storage polyfill — backed by localStorage so this runs
   anywhere, no Claude app required. Data stays on this device.
----------------------------------------------------------------*/
window.storage = {
  async get(key) {
    const raw = localStorage.getItem("kaungdesk:" + key);
    if (raw === null) return null;
    return { key, value: raw, shared: false };
  },
  async set(key, value) {
    localStorage.setItem("kaungdesk:" + key, value);
    return { key, value, shared: false };
  },
  async delete(key) {
    localStorage.removeItem("kaungdesk:" + key);
    return { key, deleted: true, shared: false };
  },
  async list(prefix = "") {
    const keys = Object.keys(localStorage)
      .filter((k) => k.startsWith("kaungdesk:" + prefix))
      .map((k) => k.replace("kaungdesk:", ""));
    return { keys, prefix, shared: false };
  },
};

/* ---------------------------------------------------------------
   STORAGE HOOK
----------------------------------------------------------------*/
function useTrades() {
  const [trades, setTrades] = useState([]);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get("journal:trades", false);
        if (res && res.value) setTrades(JSON.parse(res.value));
      } catch (e) {
        /* no trades saved yet */
      } finally {
        setLoaded(true);
      }
    })();
  }, []);

  const persist = useCallback(async (next) => {
    setTrades(next);
    try {
      await window.storage.set("journal:trades", JSON.stringify(next), false);
    } catch (e) {
      console.error("Could not save trades", e);
    }
  }, []);

  const addTrade = useCallback(
    (trade) => persist([{ ...trade, id: uid() }, ...trades]),
    [trades, persist]
  );
  const removeTrade = useCallback(
    (id) => persist(trades.filter((t) => t.id !== id)),
    [trades, persist]
  );

  return { trades, addTrade, removeTrade, loaded };
}

      <div style={styles.cardGrid}>

        <StatCard

/* ---------------------------------------------------------------
   CONSISTENCY RULE (signature element)
----------------------------------------------------------------*/
function useConsistency(trades) {
  return useMemo(() => {
    const byDay = {};
    trades.forEach((t) => {
      byDay[t.date] = (byDay[t.date] || 0) + Number(t.pnl || 0);
    });
    const days = Object.values(byDay);
    const winningDays = days.filter((d) => d > 0);
    const totalProfit = winningDays.reduce((s, d) => s + d, 0);
    if (totalProfit <= 0 || winningDays.length === 0) return { pct: null, totalProfit: 0, largest: 0 };
    const largest = Math.max(...winningDays);
    const pct = Math.round((largest / totalProfit) * 1000) / 10;
    return { pct, totalProfit, largest };
  }, [trades]);
}

function ConsistencyGauge({ trades }) {
  const { pct, totalProfit, largest } = useConsistency(trades);
  const safe = pct === null ? 0 : Math.min(pct, 100);
  const breach = pct !== null && pct > 50;
  const r = 54, c = 2 * Math.PI * r;
  const dash = (safe / 100) * c;

  return (
    <div style={styles.panel}>
      <div style={styles.panelHeadRow}>
        <div style={styles.panelHead}>
          <Gauge size={15} style={{ marginRight: 6, verticalAlign: -3 }} />
          Consistency rule
        </div>
        <span style={{ fontSize: 11.5, color: "#8B8F98" }}>largest winning day ÷ total profit</span>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 22, flexWrap: "wrap" }}>
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle cx="65" cy="65" r={r} fill="none" stroke="#262B33" strokeWidth="10" />
          <circle
            cx="65" cy="65" r={r} fill="none"
            stroke={breach ? "#C4573F" : "#4FA37A"}
            strokeWidth="10" strokeLinecap="round"
            strokeDasharray={`${dash} ${c}`}
            transform="rotate(-90 65 65)"
            style={{ transition: "stroke-dasharray .4s ease" }}
          />
          <line x1="65" y1="11" x2="65" y2="19" stroke="#D9A441" strokeWidth="2"
            transform={`rotate(${(50 / 100) * 360} 65 65)`} />
          <text x="65" y="60" textAnchor="middle" fontFamily="JetBrains Mono, monospace" fontSize="22" fill="#E9E7E1">
            {pct === null ? "—" : `${pct}%`}
          </text>
          <text x="65" y="78" textAnchor="middle" fontFamily="Inter, sans-serif" fontSize="10" fill="#8B8F98">
            of {pct === null ? "—" : "50%"} limit
          </text>
        </svg>
        <div style={{ fontSize: 13, color: "#8B8F98", lineHeight: 1.7, minWidth: 200 }}>
          <div>Total profit (winning days): <b style={{ color: "#E9E7E1" }}>{fmt$(totalProfit)}</b></div>
          <div>Largest single day: <b style={{ color: "#E9E7E1" }}>{fmt$(largest)}</b></div>
          <div style={{ marginTop: 6, color: breach ? "#C4573F" : "#4FA37A" }}>
            {pct === null
              ? "Log a profitable day to see this update."
              : breach
              ? "Over the typical 50% single-day cap — check your firm's exact rule before requesting a payout."
              : "Within the typical 50% single-day cap."}
          </div>
          <div style={{ marginTop: 8, fontSize: 11, color: "#65696F" }}>
            Approximation only — confirm the exact formula in your prop firm's rulebook (rules vary by firm).
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   EDGE TOOLS
----------------------------------------------------------------*/
const TICK_VALUES = { ES: 12.5, MES: 1.25, NQ: 5, MNQ: 0.5, Other: 5 };
const TICK_SIZE = { ES: 0.25, MES: 0.25, NQ: 0.25, MNQ: 0.25, Other: 0.25 };

function EdgeTools() {
  const [balance, setBalance] = useState(50000);
  const [riskPct, setRiskPct] = useState(1);
  const [instrument, setInstrument] = useState("MES");
  const [stopTicks, setStopTicks] = useState(20);
  const [entry, setEntry] = useState(5900);
  const [stop, setStop] = useState(5890);
  const [target, setTarget] = useState(5925);

  const riskDollars = (balance * riskPct) / 100;
  const perContractRisk = stopTicks * TICK_VALUES[instrument];
  const contracts = perContractRisk > 0 ? Math.floor(riskDollars / perContractRisk) : 0;

  const rr = useMemo(() => {
    const risk = Math.abs(Number(entry) - Number(stop));
    const reward = Math.abs(Number(target) - Number(entry));
    if (!risk) return null;
    return (reward / risk).toFixed(2);
  }, [entry, stop, target]);

  return (
    <div>
      <SectionHeader title="Edge tools" sub="Position sizing and risk/reward math — the two calculators worth checking before every entry." />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div style={styles.panel}>
          <div style={styles.panelHead}>Position size calculator</div>
          <FieldRow label="Account balance ($)">
            <input type="number" value={balance} onChange={(e) => setBalance(Number(e.target.value))} style={styles.input} />
          </FieldRow>
          <FieldRow label={`Risk per trade — ${riskPct}%`}>
            <input type="range" min="0.25" max="3" step="0.25" value={riskPct} onChange={(e) => setRiskPct(Number(e.target.value))} style={{ width: "100%" }} />
          </FieldRow>
          <FieldRow label="Instrument">
            <select value={instrument} onChange={(e) => setInstrument(e.target.value)} style={styles.input}>
              {INSTRUMENTS.map((i) => <option key={i}>{i}</option>)}
            </select>
          </FieldRow>
          <FieldRow label="Stop distance (ticks)">
            <input type="number" value={stopTicks} onChange={(e) => setStopTicks(Number(e.target.value))} style={styles.input} />
          </FieldRow>
          <div style={styles.resultBox}>
            <div style={styles.resultLine}><span>Dollar risk</span><b>{fmt$(riskDollars)}</b></div>
            <div style={styles.resultLine}><span>Risk per contract</span><b>{fmt$(perContractRisk)}</b></div>
            <div style={{ ...styles.resultLine, borderTop: "1px solid #262B33", paddingTop: 8, marginTop: 4 }}>
              <span>Max contracts</span><b style={{ color: "#C99A4A", fontSize: 20 }}>{contracts}</b>
            </div>
          </div>
        </div>

        <div style={styles.panel}>
          <div style={styles.panelHead}>Risk / reward calculator</div>
          <FieldRow label="Entry price">
            <input type="number" value={entry} onChange={(e) => setEntry(e.target.value)} style={styles.input} />
          </FieldRow>
          <FieldRow label="Stop price">
            <input type="number" value={stop} onChange={(e) => setStop(e.target.value)} style={styles.input} />
          </FieldRow>
          <FieldRow label="Target price">
            <input type="number" value={target} onChange={(e) => setTarget(e.target.value)} style={styles.input} />
          </FieldRow>
          <div style={styles.resultBox}>
            <div style={styles.resultLine}>
              <span>Risk : Reward</span>
              <b style={{ color: rr && rr >= 1.5 ? "#4FA37A" : "#D9A441", fontSize: 20 }}>{rr ? `1 : ${rr}` : "—"}</b>
            </div>
            <div style={{ fontSize: 11.5, color: "#65696F", marginTop: 6 }}>
              Most funded-account rules reward consistency more than home-run R multiples — size for survival first.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function MarketBrief() {
  const [text, setText] = useState("");
  const [saved, setSaved] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get("brief:notes", false);
        if (res?.value) setText(res.value);
      } catch (e) {}
    })();
  }, []);

  const save = async () => {
    try {
      await window.storage.set("brief:notes", text, false);
      setSaved(true);
    } catch (e) {}
  };

  return (
    <div>
      <SectionHeader title="Market brief" sub="Your own pre-market notes — key levels, catalysts, and bias for the session. Write it before the open, review it after the close." />
      <div style={styles.panel}>
        <textarea
          value={text}
          onChange={(e) => { setText(e.target.value); setSaved(false); }}
          placeholder={"Example:\n• ES bias: bullish above 5900, watch for FVG fill 5885–5892\n• 8:30 ET: Initial jobless claims\n• Killzone focus: NY AM"}
          rows={14}
          style={{ ...styles.input, resize: "vertical", fontFamily: "JetBrains Mono, monospace", fontSize: 13, lineHeight: 1.6 }}

          <span style={{ fontSize: 11.5, color: "#65696F" }}>{saved ? "Saved" : "Unsaved changes"}</span>

      </div>
    </div>
  );
}

function StatisticalModels({ trades }) {
  const byInstrument = useMemo(() => {
    const map = {};
    trades.forEach((t) => {
      map[t.instrument] = map[t.instrument] || { count: 0, wins: 0, pnl: 0 };
      map[t.instrument].count++;
      map[t.instrument].pnl += Number(t.pnl || 0);
      if (Number(t.pnl) > 0) map[t.instrument].wins++;
    });
    return map;
  }, [trades]);

  const models = [
    { name: "Gap fill", desc: "Likelihood the overnight gap closes before the session ends." },
    { name: "Initial balance", desc: "First-hour range as a predictor of the day's expansion direction." },
    { name: "Opening range breakout", desc: "Follow-through rate once price clears the opening range." },
    { name: "Session continuation", desc: "Odds the prior session's trend direction persists into the next." },
  ];

  return (
    <div>
      <SectionHeader title="Statistical models" sub="Model descriptions are static reference; the table below is calculated live from your own trade journal." />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>

          <div key={m.name} style={styles.panel}>
            <div style={styles.panelHead}>{m.name}</div>
            <div style={{ fontSize: 12.5, color: "#8B8F98" }}>{m.desc}</div>
          </div>
        ))}
      </div>
      <div style={styles.panel}>
        <div style={styles.panelHeadRow}>
          <div style={styles.panelHead}>Your performance by instrument</div>
          <span style={{ fontSize: 11.5, color: "#4FA37A" }}>● derived from your journal</span>
        </div>
        {Object.keys(byInstrument).length === 0 ? (
          <div style={{ color: "#8B8F98", fontSize: 13 }}>Log trades in the Journal to populate this table.</div>
        ) : (
          <>
            <TableHead cols={["Instrument", "Trades", "Win rate", "Net P&L"]} />
            {Object.entries(byInstrument).map(([inst, d]) => (
              <div key={inst} style={styles.tableRow}>
                <div style={{ flex: 1 }}>{inst}</div>

              </div>
            ))}
          </>
        )}

    </div>
  );
}
